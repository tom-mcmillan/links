*, *::before, *::after { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }

body {
  margin: 0;

header {

nav a:hover { border-color: #100F0F; }

nav a:active {
  transform: scale(0.99);
  background-color: rgba(16, 15, 15, 0.03);

nav a:focus-visible {

  outline-offset: 2px;
}

  display: block;
  font-weight: 600;

  color: #6F6E69;
  font-size: 0.9375rem;

  color: #B7B5AC;
  font-size: 1.25rem;
  line-height: 1;
  transition: color 150ms ease, transform 150ms ease;

  transform: translateX(2px);
