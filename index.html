<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tom McMillan — NWSL analytics &amp; research</title>
<meta name="description" content="Tom McMillan — NWSL analytics &amp; research. Links to NWSL Notebook, papers, newsletter, and consulting.">
<meta name="theme-color" content="#0B0A08">
<meta name="color-scheme" content="dark">

<meta property="og:type" content="website">
<meta property="og:title" content="Tom McMillan">
<meta property="og:description" content="NWSL analytics &amp; research">

<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Tom McMillan">
<meta name="twitter:description" content="NWSL analytics &amp; research">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600;700&display=swap">

<script>
(() => {
  const h = new Date().getHours();
  const tone =
    h < 6  ? 'night' :
    h < 10 ? 'dawn'  :
    h < 17 ? 'day'   :
    h < 21 ? 'dusk'  : 'night';
  document.documentElement.dataset.tone = tone;
})();
</script>

<style>
:root {
  --bg: #0B0A08;
  --ink: #F6EFE6;
  --ink-muted: rgba(246, 239, 230, 0.62);
  --ink-quiet: rgba(246, 239, 230, 0.38);
  --line: rgba(246, 239, 230, 0.08);
  --line-strong: rgba(246, 239, 230, 0.22);
  --panel: rgba(246, 239, 230, 0.020);
  --panel-strong: rgba(246, 239, 230, 0.042);

  --tone-a: #D14D41;
  --tone-b: #D0A215;
  --tone-c: #DA702C;

  --accent-notebook:   #D14D41;
  --accent-research:   #4385BE;
  --accent-substack:   #D0A215;
  --accent-consulting: #8B7EC8;

  --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, monospace;
  --serif: "Instrument Serif", Georgia, "Times New Roman", serif;
  --shadow: 0 28px 80px rgba(0, 0, 0, 0.45);
}

:root[data-tone="dawn"]  { --tone-a: #D0A215; --tone-b: #DA702C; --tone-c: #AD8301; }
:root[data-tone="day"]   { --tone-a: #D14D41; --tone-b: #D0A215; --tone-c: #DA702C; }
:root[data-tone="dusk"]  { --tone-a: #AF3029; --tone-b: #8B7EC8; --tone-c: #DA702C; }
:root[data-tone="night"] { --tone-a: #8B7EC8; --tone-b: #4385BE; --tone-c: #AF3029; }

*, *::before, *::after { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 400;
  background:
    radial-gradient(circle at 18% 22%, color-mix(in oklab, var(--tone-a) 38%, transparent) 0%, transparent 30%),
    radial-gradient(circle at 82% 18%, color-mix(in oklab, var(--tone-b) 28%, transparent) 0%, transparent 26%),
    radial-gradient(circle at 50% 88%, color-mix(in oklab, var(--tone-c) 24%, transparent) 0%, transparent 28%),
    var(--bg);
  color: var(--ink);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
  position: relative;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image:
    linear-gradient(rgba(246, 239, 230, 0.022) 1px, transparent 1px),
    linear-gradient(90deg, rgba(246, 239, 230, 0.022) 1px, transparent 1px);
  background-size: 44px 44px;
  -webkit-mask-image: radial-gradient(circle at center, black, transparent 82%);
          mask-image: radial-gradient(circle at center, black, transparent 82%);
}

main {
  position: relative;
  z-index: 1;
  max-width: 460px;
  margin: 0 auto;
  padding: clamp(3.5rem, 11vh, 6rem) 1.5rem 2.5rem;
}

header { margin-bottom: 2.5rem; }

.eyebrow {
  margin: 0 0 1.5rem;
  display: flex;
  align-items: center;
  gap: 0.625rem;
}

.eyebrow-chip {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 5px 11px 5px 9px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--panel-strong);
  color: var(--ink);
  font-family: var(--mono);
  font-size: 0.66rem;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}

.eyebrow-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--tone-a);
  box-shadow: 0 0 10px color-mix(in oklab, var(--tone-a) 70%, transparent);
  animation: dotPulse 2.6s ease-in-out infinite;
}

@keyframes dotPulse {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.5; }
}

h1 {
  margin: 0 0 0.4rem;
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(3.25rem, 14vw, 4.5rem);
  line-height: 0.95;
  letter-spacing: -0.025em;
  color: var(--ink);
  text-wrap: balance;
}

.descriptor {
  margin: 0;
  font-family: var(--serif);
  font-size: clamp(1.35rem, 5vw, 1.625rem);
  line-height: 1.2;
  letter-spacing: -0.01em;
  color: var(--ink-muted);
  text-wrap: balance;
}

.descriptor em {
  font-style: italic;
  background: linear-gradient(110deg, var(--tone-a) 0%, var(--tone-c) 55%, var(--tone-b) 100%);
  background-size: 220% 100%;
  -webkit-background-clip: text;
          background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
  filter: drop-shadow(0 0 22px color-mix(in oklab, var(--tone-a) 35%, transparent));
  animation: shimmer 9s ease-in-out infinite;
}

@keyframes shimmer {
  0%, 100% { background-position: 0% 50%; }
  50%      { background-position: 100% 50%; }
}

nav {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.card {
  --card-accent: var(--ink);
  display: flex;
  align-items: flex-start;
  gap: 1rem;
  padding: 1.125rem 1.25rem;
  min-height: 92px;
  background: linear-gradient(180deg, var(--panel-strong), var(--panel));
  border: 1px solid var(--line);
  border-radius: 14px;
  color: inherit;
  text-decoration: none;
  box-shadow: var(--shadow);
  transition:
    border-color 260ms ease,
    transform 260ms cubic-bezier(0.2, 0.7, 0.2, 1),
    box-shadow 260ms ease;
  opacity: 0;
  transform: translateY(12px);
  animation: rise 560ms cubic-bezier(0.2, 0.7, 0.2, 1) forwards;
  animation-delay: calc(var(--i, 0) * 90ms + 120ms);
}

.card[data-accent="notebook"]   { --card-accent: var(--accent-notebook); }
.card[data-accent="research"]   { --card-accent: var(--accent-research); }
.card[data-accent="substack"]   { --card-accent: var(--accent-substack); }
.card[data-accent="consulting"] { --card-accent: var(--accent-consulting); }

@keyframes rise {
  to { opacity: 1; transform: translateY(0); }
}

.card:hover {
  border-color: color-mix(in oklab, var(--card-accent) 50%, var(--line-strong));
  transform: translateY(-2px);
  box-shadow:
    var(--shadow),
    0 0 0 1px color-mix(in oklab, var(--card-accent) 12%, transparent),
    0 0 40px -10px color-mix(in oklab, var(--card-accent) 28%, transparent);
}

.card:active {
  transform: translateY(0);
}

.card:focus-visible {
  outline: 2px solid var(--card-accent);
  outline-offset: 2px;
}

.card-index {
  font-family: var(--mono);
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--ink-quiet);
  letter-spacing: 0.06em;
  min-width: 1.75rem;
  padding-top: 0.125rem;
  font-variant-numeric: tabular-nums;
  transition: color 260ms ease;
}

.card:hover .card-index { color: var(--card-accent); }

.card-body { flex: 1; min-width: 0; }

.card-title {
  display: block;
  font-family: var(--mono);
  font-weight: 600;
  font-size: 0.82rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink);
  margin-bottom: 0.3rem;
}

.card-subtitle {
  display: block;
  font-family: var(--serif);
  font-style: italic;
  font-size: 1.1875rem;
  line-height: 1.2;
  color: var(--ink-muted);
  letter-spacing: -0.01em;
  margin-bottom: 0.4rem;
}

.card-domain {
  display: block;
  font-family: var(--mono);
  font-size: 0.62rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-quiet);
  transition: color 260ms ease;
}

.card:hover .card-domain { color: var(--card-accent); }

.card-arrow {
  font-family: var(--mono);
  color: var(--ink-quiet);
  font-size: 1.125rem;
  line-height: 1;
  padding-top: 0.25rem;
  transition: color 260ms ease, transform 260ms ease;
}

.card:hover .card-arrow {
  color: var(--card-accent);
  transform: translateX(5px);
}

footer {
  margin-top: 2.5rem;
  padding-top: 1.25rem;
  border-top: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 1rem;
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-quiet);
}

footer p { margin: 0; }

footer .tone-label { color: var(--tone-a); }

@media (prefers-reduced-motion: reduce) {
  .card { animation: none; opacity: 1; transform: none; }
  .card:hover { transform: none; }
  .card:hover .card-arrow { transform: none; }
  .descriptor em { animation: none; }
  .eyebrow-dot { animation: none; }
}
</style>
</head>
<body>
<main>
  <header>
    <p class="eyebrow">
      <span class="eyebrow-chip"><span class="eyebrow-dot"></span>Tom McMillan</span>
    </p>
    <h1>NWSL</h1>
    <p class="descriptor"><em>analytics</em> &amp; research</p>
  </header>

  <nav aria-label="Destinations">
    <a class="card" data-accent="notebook" style="--i:0" href="https://nwslnotebook.com">
      <span class="card-index">01</span>
      <span class="card-body">
        <span class="card-title">NWSL Notebook</span>
        <span class="card-subtitle">Match analysis &amp; data</span>
        <span class="card-domain">nwslnotebook.com</span>
      </span>
      <span class="card-arrow" aria-hidden="true">&rarr;</span>
    </a>
    <a class="card" data-accent="research" style="--i:1" href="https://nwslt.com">
      <span class="card-index">02</span>
      <span class="card-body">
        <span class="card-title">Research</span>
        <span class="card-subtitle">Papers &amp; technical writing</span>
        <span class="card-domain">nwslt.com</span>
      </span>
      <span class="card-arrow" aria-hidden="true">&rarr;</span>
    </a>
    <a class="card" data-accent="substack" style="--i:2" href="https://itstommcmillan.substack.com">
      <span class="card-index">03</span>
      <span class="card-body">
        <span class="card-title">Substack</span>
        <span class="card-subtitle">Newsletter</span>
        <span class="card-domain">itstommcmillan.substack.com</span>
      </span>
      <span class="card-arrow" aria-hidden="true">&rarr;</span>
    </a>
    <a class="card" data-accent="consulting" style="--i:3" href="https://www.tomcomputing.org/">
      <span class="card-index">04</span>
      <span class="card-body">
        <span class="card-title">Consulting</span>
        <span class="card-subtitle">Advisory &amp; engagements</span>
        <span class="card-domain">tomcomputing.org</span>
      </span>
      <span class="card-arrow" aria-hidden="true">&rarr;</span>
    </a>
  </nav>

  <footer>
    <p>Four places · one person</p>
    <p>Tone <span class="tone-label" id="tone-label">day</span></p>
  </footer>
</main>

<script>
  const t = document.documentElement.dataset.tone;
  const el = document.getElementById('tone-label');
  if (t && el) el.textContent = t;
</script>
</body>
</html>
